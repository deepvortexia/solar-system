<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solar System 3D — Interactive Explorer</title>
  <meta name="description" content="Interactive 3D solar system built in Blender. Click any planet to explore real planetary data." />
</head>
<body>
  <div id="loading">
    <div class="loader-ring"></div>
    <p>Loading solar system…</p>
  </div>

  <div id="hint">Drag to orbit &middot; Scroll to zoom &middot; Click a planet</div>

  <div id="tooltip"></div>

  <aside id="info-panel">
    <button id="close-panel" aria-label="Close">&times;</button>
    <h2 id="info-name"></h2>
    <p id="info-type"></p>
    <div id="info-stats"></div>
    <p id="info-fact"></p>
  </aside>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
